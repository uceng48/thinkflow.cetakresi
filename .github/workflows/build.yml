name: Build Windows Portable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Izinkan penggunaan Node.js 20 meskipun sudah deprecated
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'   <-- dihapus agar tidak memerlukan lock file

      - name: Install dependencies
        run: npm install

      - name: Build portable EXE
        run: npm run dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThinkFlow-Cetak-Resi
          path: dist/ThinkFlow-Cetak-Resi.exe
